<!-- 1. Advanced Custom CSS for the Widget Container -->
<style>
  /* Import a sleek, modern font */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  /* Target the Watson Assistant host container */
  #WACContainer {
    /* Adds a soft, premium neon glow to the launcher/widget */
    filter: drop-shadow(0 10px 25px rgba(109, 40, 217, 0.45));
    /* Adds a smooth, continuous floating effect */
    animation: floatingWidget 6s ease-in-out infinite;
    transition: filter 0.3s ease;
  }

  #WACContainer:hover {
    /* Intensifies the glow when the user hovers over the widget */
    filter: drop-shadow(0 15px 35px rgba(109, 40, 217, 0.65));
  }

  @keyframes floatingWidget {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }
</style>

<!-- 2. The Updated Watson Initialization Script -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "5efb8d60-a951-4a1c-b535-daaec6f48f4d", 
    region: "https://integrations.eu-de.assistant.watson.appdomain.cloud", 
    serviceInstanceID: "ee25e0bf-9270-4aee-8671-a7adfdf901a9",
    
    // Force the base theme to dark mode for a sleeker look
    theme: 'dark', 
    
    onLoad: async (instance) => { 
      // Use the official API to inject advanced styling into the widget
      instance.updateCSSVariables({
        // Typography
        'BASE-font-family': '"Inter", sans-serif',
        
        // Premium Dark Backgrounds
        '$ui-01': '#111827', // Main chat background (Deep Gray/Black)
        '$ui-02': '#1f2937', // Header/Input background
        
        // Brand/Accent Colors (Neon Purple aesthetic)
        '$interactive-01': '#7c3aed', // Primary brand color
        '$interactive-02': '#6d28d9', // Darker purple for contrast
        '$interactive-03': '#a78bfa', // Light purple for subtle highlights
        '$focus': '#8b5cf6',          // Focus rings
        '$hover-primary': '#5b21b6',  // Hover states on buttons
        
        // Text Colors
        '$text-01': '#f9fafb', // Crisp white text
        '$text-02': '#9ca3af', // Subtle secondary text
        
        // Advanced rounding for a modern "bubble" feel
        'border-radius-1': '12px', // Inner elements
        'border-radius-2': '16px', // Chat bubbles
        'border-radius-3': '24px'  // Main container / Launcher
      });

      await instance.render(); 
    }
  };

  setTimeout(function(){
    const t = document.createElement('script');
    t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>
