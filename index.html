<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FoodBot 🍔</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* Glass Card */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 40px;
    width: 80%;
    max-width: 700px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

/* Heading */
h1 {
    font-size: 42px;
    color: #fff;
}

p {
    margin-top: 10px;
    color: #fff;
    opacity: 0.8;
}

/* Food Cards */
.food-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 30px;
}

.card {
    background: rgba(255,255,255,0.3);
    padding: 20px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s ease;
    font-size: 22px;
}

.card:hover {
    transform: translateY(-8px) scale(1.05);
    background: rgba(255,255,255,0.5);
}

/* Button */
.btn {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #ff6f61;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #ff3b2e;
    transform: scale(1.05);
}

/* Floating animation */
@keyframes float {
    0% { transform: translateY(0px);}
    50% { transform: translateY(-10px);}
    100% { transform: translateY(0px);}
}

.container {
    animation: float 5s ease-in-out infinite;
}

</style>
</head>

<body>

<div class="container">
    <h1>FoodBot 😋</h1>
    <p>Tap a food or chat below!</p>

    <div class="food-grid">
        <div class="card" onclick="sendFood('pizza')">🍕 Pizza</div>
        <div class="card" onclick="sendFood('burger')">🍔 Burger</div>
        <div class="card" onclick="sendFood('fries')">🍟 Fries</div>
        <div class="card" onclick="sendFood('pasta')">🍝 Pasta</div>
        <div class="card" onclick="sendFood('sandwich')">🥪 Sandwich</div>
        <div class="card" onclick="sendFood('drink')">🥤 Drink</div>
    </div>

    <button class="btn" onclick="openChat()">Chat with Bot 💬</button>
</div>

<script>
function sendFood(food) {
    alert("You selected " + food + " 😋\nNow ask the bot!");
}

function openChat() {
    alert("Click the chat icon at bottom right 👉");
}
</script>

<!-- Watson Assistant -->
<script>
window.watsonAssistantChatOptions = {
  integrationID: "5efb8d60-a951-4a1c-b535-daaec6f48f4d",
  region: "eu-de",
  serviceInstanceID: "ee25e0bf-9270-4aee-8671-a7adfdf901a9",
  onLoad: async (instance) => { await instance.render(); }
};
setTimeout(function(){
  const t=document.createElement('script');
  t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
  (window.watsonAssistantChatOptions.clientVersion || 'latest') +
  "/WatsonAssistantChatEntry.js";
  document.head.appendChild(t);
});
</script>

</body>
</html>
