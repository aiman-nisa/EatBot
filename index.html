<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EatBot</title>

  <!-- 🌐 Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      height: 100vh;
    }

    /* 🚀 Floating Chat Button */
    .WACLauncher__Button {
      background: linear-gradient(135deg, #667eea, #764ba2) !important;
      border-radius: 50% !important;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3) !important;
      transition: all 0.3s ease !important;
    }

    .WACLauncher__Button:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 35px rgba(0,0,0,0.4) !important;
    }

    /* 💬 Chat Container */
    .WAC__chat-container {
      border-radius: 20px !important;
      overflow: hidden !important;
      backdrop-filter: blur(15px) !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4) !important;
    }

    /* 🧊 Header */
    .WAC__header {
      background: linear-gradient(135deg, #667eea, #764ba2) !important;
      color: #fff !important;
      font-weight: 600 !important;
    }

    /* 🫧 Messages */
    .WAC__sent-message,
    .WAC__received-message {
      border-radius: 18px !important;
      padding: 10px 14px !important;
      font-size: 14px !important;
    }

    .WAC__sent-message {
      background: #667eea !important;
      color: white !important;
    }

    .WAC__received-message {
      background: rgba(255,255,255,0.9) !important;
      color: #333 !important;
    }

    /* ✨ Input */
    .WAC__input-container {
      border-top: 1px solid rgba(255,255,255,0.2) !important;
      backdrop-filter: blur(10px) !important;
    }

    .WAC__input-container input {
      border-radius: 20px !important;
      padding: 10px !important;
    }

    /* 🚀 Send Button */
    .WAC__send-button {
      background: #764ba2 !important;
      border-radius: 50% !important;
    }

    /* 🌙 Scrollbar */
    .WAC__messages-container::-webkit-scrollbar {
      width: 6px;
    }
    .WAC__messages-container::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<script>
  window.watsonAssistantChatOptions = {
    integrationID: "5efb8d60-a951-4a1c-b535-daaec6f48f4d",
    region: "eu-de", // ✅ FIXED (not full URL)
    serviceInstanceID: "ee25e0bf-9270-4aee-8671-a7adfdf901a9",

    onLoad: async (instance) => {

      // 🎨 Theme customization
      instance.updateCSSVariables({
        'BASE-font-family': "'Poppins', sans-serif",
        'BASE-primary-color': '#667eea',
        'BASE-secondary-color': '#764ba2',
        'BASE-background-color': '#1a1a2e',
        'BASE-text-color': '#ffffff'
      });

      await instance.render();
    }
  };

  setTimeout(function(){
    const t = document.createElement('script');
    t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/latest/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
